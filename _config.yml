# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/

title: "Aaron Hertzmann's blog"
description: "Aaron Hertzmann's essays on art, technology, perception, and how they intersect."
github_username: hertzmann


# Email and twitter are optional:
email:
twitter_username: "AaronHertzmann"

# Social-media card settings, read by jekyll-seo-tag ({% seo %} in head.html)
twitter:
  username: AaronHertzmann
  card: summary_large_image
author:
  name: Aaron Hertzmann
  twitter: AaronHertzmann

# Front-matter defaults: posts without their own image get the default card image.
# default_card_image must match the image path below; home.html uses it to avoid
# showing the fallback image as a thumbnail in the post listing.
default_card_image: /images/wica/bradford_viewers.jpg
defaults:
  - scope:
      path: ""
      type: posts
    values:
      image: /images/wica/bradford_viewers.jpg
instagram_username: "aaronhertzmann"
facebook_username: 
mastodon:
- username: aaronhertzmann
  instance: fediscience.org

# Set this to true to get LaTeX math equation support
use_math: false

# Everything below here can be ignored, unless you want to change the theme entirely
theme: minima
plugins:
  - jekyll-feed
  - jekyll-octicons
  - jekyll-redirect-from

titles_from_headings:
  enabled:     true
  strip_title: true
  collections: true

highlighter: rouge
markdown: kramdown
kramdown:
  math_engine: katex
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# additions based on https://amytabb.com/ts/2018_11_12/
url: https://aaronhertzmann.com
title_image: "https://aaronhertzmann.com/images/wica/bradford_viewers.jpg"        # default Twitter card image when no other image provided

timezone: America/San_Francisco

whitelist:
  - jekyll-redirect-from
